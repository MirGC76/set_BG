<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=4, user-scalable=yes">
<title>러시아워</title>
<style>
:root{
  --bg-deep:#1A1D21;
  --bg-mid:#24282D;
  --line:#3A3F45;
  --road:#3A3F45;
  --road-line:#F2C94C;
  --wall:#52585F;
  --text:#F0F1F3;
  --muted:#9AA1A8;
  --amber:#F2C94C;
  --good:#2FA84F;
  --bad:#D8483D;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;}
body{
  min-height:100vh;
  background:linear-gradient(180deg,var(--bg-deep),var(--bg-mid));
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic","Pretendard",sans-serif;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}
.hidden{display:none !important;}
#app{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px 12px 50px;}
.back-link{align-self:flex-start;color:var(--muted);font-size:12.5px;text-decoration:none;margin-bottom:10px;}

/* ---------- SETUP / LEVEL SELECT ---------- */
#setup{width:100%;max-width:720px;display:flex;flex-direction:column;align-items:center;margin-top:2vh;}
#level-select{width:100%;max-width:720px;display:flex;flex-direction:column;align-items:center;margin-top:2vh;}
.swatches{display:flex;gap:6px;margin-bottom:10px;}
.swatch{width:30px;height:16px;border-radius:4px;}
h1.title{font-size:clamp(26px,6vw,40px);font-weight:900;letter-spacing:3px;margin:4px 0;}
.subtitle{color:var(--muted);font-size:13.5px;margin-bottom:24px;text-align:center;}
.level-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px;width:100%;}
.level-card{
  background:rgba(255,255,255,0.05);border:2px solid var(--line);border-radius:12px;padding:14px 10px;
  cursor:pointer;text-align:center;transition:border-color .15s, transform .15s;
}
.level-card:hover{border-color:var(--amber);transform:translateY(-3px);}
.level-card.cleared{border-color:var(--good);background:rgba(47,168,79,0.08);}
.level-card .num{font-size:24px;font-weight:900;}
.level-card .label{font-size:11.5px;color:var(--muted);letter-spacing:0.5px;margin-top:2px;}
.level-card .best{font-size:11px;color:var(--amber);margin-top:6px;}
.level-card .check{font-size:16px;color:var(--good);}

.diff-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:16px;width:100%;max-width:600px;}
.diff-card{
  border:2px solid var(--line);border-radius:16px;padding:26px 14px;text-align:center;cursor:pointer;
  transition:border-color .15s, transform .15s; background:rgba(255,255,255,0.04);
}
.diff-card:hover{transform:translateY(-4px);}
.diff-card .diff-name{font-size:20px;font-weight:900;margin-bottom:6px;}
.diff-card .diff-desc{font-size:11.5px;color:var(--muted);}
.diff-card .diff-progress{font-size:11px;color:var(--amber);margin-top:10px;}
.diff-card.easy{border-color:#2FA84F;}
.diff-card.easy:hover{box-shadow:0 0 0 3px rgba(47,168,79,0.25);}
.diff-card.medium{border-color:#2E6DA4;}
.diff-card.medium:hover{box-shadow:0 0 0 3px rgba(46,109,164,0.25);}
.diff-card.hard{border-color:#E0A83C;}
.diff-card.hard:hover{box-shadow:0 0 0 3px rgba(224,168,60,0.25);}
.diff-card.hell{border-color:#D8483D;}
.diff-card.hell:hover{box-shadow:0 0 0 3px rgba(216,72,61,0.25);}

/* ---------- GAME ---------- */
#game{width:100%;max-width:820px;display:flex;flex-direction:column;align-items:center;}
.topbar{width:100%;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px;}
.icon-btn{background:transparent;border:1px solid var(--line);color:var(--text);border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer;}
.zoom-row{display:flex;align-items:center;gap:8px;}
.zoom-btn{background:rgba(255,255,255,0.06);border:1px solid var(--line);color:var(--text);border-radius:8px;width:32px;height:32px;font-size:17px;font-weight:800;cursor:pointer;}
.zoom-btn:disabled{opacity:0.35;cursor:not-allowed;}
.zoom-pct{font-size:12px;color:var(--muted);min-width:40px;text-align:center;}
.info-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:14px;}
.info-chip{background:rgba(255,255,255,0.07);border-radius:20px;padding:8px 18px;font-size:13px;font-weight:700;letter-spacing:0.3px;}

.board-wrap{
  --cell:56px;
  position:relative;background:var(--wall);border-radius:14px;padding:14px;
  box-shadow:0 14px 30px rgba(0,0,0,0.5);
}
.board{
  display:grid;grid-template-columns:repeat(6, var(--cell));grid-template-rows:repeat(6, var(--cell));
  gap:3px;background:#2a2e33;border-radius:6px;overflow:visible;position:relative;
}
.cell{background:var(--road);position:relative;}
.cell.reachable{background:#4a5460;cursor:pointer;}
.cell.reachable::after{content:"";position:absolute;inset:30%;border-radius:50%;background:rgba(242,201,76,0.55);}
.cell.exit-cell{position:relative;}
.exit-mark{
  position:absolute;top:0;bottom:0;right:-16px;width:16px;
  background:repeating-linear-gradient(180deg, var(--road-line) 0 8px, transparent 8px 16px);
  border-radius:0 4px 4px 0;
}
.car{
  position:relative;border-radius:9px;cursor:pointer;
  box-shadow:0 3px 0 rgba(0,0,0,0.35), inset 0 0 0 1px rgba(255,255,255,0.15);
  transition:grid-column .16s ease, grid-row .16s ease, box-shadow .12s, transform .12s;
  display:flex;align-items:center;justify-content:center;
}
.car.selected{box-shadow:0 0 0 3px var(--amber), 0 3px 0 rgba(0,0,0,0.35);transform:translateY(-1px);}
.car.target::before{content:"▶";position:absolute;right:6px;color:rgba(255,255,255,0.85);font-size:15px;}
.car .headlight{position:absolute;width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.55);}

.controls-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:16px 0;}
.ctrl-btn{background:rgba(255,255,255,0.07);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:9px 16px;font-weight:700;font-size:13px;cursor:pointer;}
.ctrl-btn.primary{background:linear-gradient(180deg,#FFDE7A,var(--amber));color:#2b2205;border:none;}
.ctrl-btn:disabled{opacity:0.4;cursor:not-allowed;}

#end-overlay{position:fixed;inset:0;background:rgba(6,8,10,0.85);display:flex;align-items:center;justify-content:center;z-index:50;}
#end-modal{background:var(--bg-mid);border:1px solid var(--line);border-radius:16px;padding:32px 30px;max-width:380px;width:90%;text-align:center;}
#end-modal h2{font-size:24px;margin:0 0 10px;}
#end-modal .stars{font-size:30px;letter-spacing:4px;margin:8px 0;color:var(--amber);}
#end-modal .stat{color:var(--muted);font-size:14px;margin:4px 0 20px;}
#end-modal .btnrow{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
</style>
</head>
<body>
<div id="app">

  <!-- DIFFICULTY SELECT -->
  <div id="setup">
    <a href="../" class="back-link">← 게임 허브로</a>
    <div class="swatches">
      <div class="swatch" style="background:#C0392B"></div>
      <div class="swatch" style="background:#2E6DA4"></div>
      <div class="swatch" style="background:#1E8449"></div>
      <div class="swatch" style="background:#E0A83C"></div>
    </div>
    <h1 class="title">러 시 아 워</h1>
    <div class="subtitle">자동차들을 밀어서 빨간 차가 출구로 빠져나가게 하는 슬라이딩 퍼즐</div>
    <div class="diff-grid" id="diff-grid"></div>
  </div>

  <!-- LEVEL SELECT (per difficulty) -->
  <div id="level-select" class="hidden">
    <a href="#" class="back-link" id="back-to-diff">← 난이도 선택</a>
    <h1 class="title" id="diff-title" style="font-size:28px;"></h1>
    <div class="subtitle" id="diff-subtitle"></div>
    <div class="level-grid" id="level-grid"></div>
  </div>

  <!-- GAME -->
  <div id="game" class="hidden">
    <div class="topbar">
      <button class="icon-btn" id="quit-btn">← 레벨 선택</button>
      <div class="zoom-row">
        <span style="font-size:11.5px;color:var(--muted);">화면 크기</span>
        <button class="zoom-btn" id="zoom-out-btn">－</button>
        <span class="zoom-pct" id="zoom-pct">100%</span>
        <button class="zoom-btn" id="zoom-in-btn">＋</button>
      </div>
    </div>
    <div class="info-row">
      <div class="info-chip" id="level-chip">레벨 1</div>
      <div class="info-chip" id="move-chip">이동 횟수: 0</div>
    </div>

    <div class="board-wrap"><div class="board" id="board"></div></div>

    <div class="controls-row">
      <button class="ctrl-btn" id="undo-btn">↩ 실행 취소</button>
      <button class="ctrl-btn" id="reset-btn">🔄 다시하기</button>
      <button class="ctrl-btn primary" id="hint-btn">💡 최적 이동 수 보기</button>
    </div>
  </div>

</div>

<div id="end-overlay" class="hidden">
  <div id="end-modal">
    <h2>탈출 성공! 🚗💨</h2>
    <div class="stars" id="end-stars">★★★</div>
    <div class="stat" id="end-stat"></div>
    <div class="btnrow">
      <button class="ctrl-btn" id="retry-btn">다시하기</button>
      <button class="ctrl-btn" id="levels-btn">레벨 선택</button>
      <button class="ctrl-btn primary" id="next-btn">다음 레벨 →</button>
    </div>
  </div>
</div>

"col":2,"color":"#D2A0C4"},{"id":"H","o":"H","len":3,"row":5,"col":3,"color":"#3498DB"},{"id":"I","o":"H","len":2,"row":3,"col":3,"color":"#7D8C38"},{"id":"J","o":"H","len":2,"row":0,"col":3,"color":"#5D6D7E"},{"id":"K","o":"H","len":2,"row":5,"col":0,"color":"#C9A227"}]},{"id":119,"difficulty":"헬","optimal":13,"cars":[{"id":"X","o":"H","len":2,"row":2,"col":1,"target":true,"color":"#C0392B"},{"id":"A","o":"H","len":2,"row":4,"col":2,"color":"#2E6DA4"},{"id":"B","o":"V","len":2,"row":3,"col":5,"color":"#1E8449"},{"id":"C","o":"V","len":2,"row":4,"col":1,"color":"#E0A83C"},{"id":"D","o":"V","len":2,"row":0,"col":2,"color":"#8E44AD"},{"id":"E","o":"V","len":2,"row":2,"col":3,"color":"#16A085"},{"id":"F","o":"V","len":2,"row":3,"col":0,"color":"#A0522D"},{"id":"G","o":"H","len":2,"row":5,"col":3,"color":"#D2A0C4"},{"id":"H","o":"V","len":2,"row":0,"col":0,"color":"#3498DB"},{"id":"I","o":"H","len":2,"row":0,"col":3,"color":"#7D8C38"},{"id":"J","o":"H","len":3,"row":1,"col":3,"color":"#5D6D7E"},{"id":"K","o":"V","len":2,"row":3,"col":4,"color":"#C9A227"},{"id":"L","o":"V","len":2,"row":0,"col":1,"color":"#E67E22"}]},{"id":120,"difficulty":"헬","optimal":17,"cars":[{"id":"X","o":"H","len":2,"row":2,"col":0,"target":true,"color":"#C0392B"},{"id":"A","o":"V","len":3,"row":0,"col":2,"color":"#2E6DA4"},{"id":"B","o":"H","len":2,"row":4,"col":1,"color":"#1E8449"},{"id":"C","o":"H","len":2,"row":3,"col":2,"color":"#E0A83C"},{"id":"D","o":"V","len":2,"row":0,"col":1,"color":"#8E44AD"},{"id":"E","o":"V","len":2,"row":1,"col":3,"color":"#16A085"},{"id":"F","o":"V","len":2,"row":3,"col":0,"color":"#A0522D"},{"id":"G","o":"V","len":2,"row":1,"col":5,"color":"#D2A0C4"},{"id":"H","o":"V","len":2,"row":4,"col":3,"color":"#3498DB"},{"id":"I","o":"V","len":3,"row":1,"col":4,"color":"#7D8C38"}]}];
const BOARD=6, EXIT_ROW=2;

/* ============ GAME STATE ============ */
let currentLevelIdx=0;
let currentDifficulty=null;
let cars=[];
let initialCars=[];
let history=[];
let moveCount=0;
let selectedId=null;
let gameOver=false;
let clearedLevels=new Set();

const DIFFICULTIES=[
  {key:'쉬움', className:'easy', desc:'최적 1~2수'},
  {key:'보통', className:'medium', desc:'최적 3~4수'},
  {key:'어려움', className:'hard', desc:'최적 5~7수'},
  {key:'헬', className:'hell', desc:'최적 8수 이상'},
];

function cloneCars(arr){ return arr.map(c=>({...c})); }
function findCar(id){ return cars.find(c=>c.id===id); }
function occCells(list, excludeId){
  const set=new Set();
  list.forEach(c=>{
    if(c.id===excludeId) return;
    for(let i=0;i<c.len;i++){
      const r=c.row+(c.o==='V'?i:0), col=c.col+(c.o==='H'?i:0);
      set.add(r+','+col);
    }
  });
  return set;
}
function isSolved(){
  const t=cars.find(c=>c.target);
  return t.col + t.len - 1 === BOARD-1;
}

/* ============ REACH / MOVE ============ */
function computeReach(car){
  const occ=occCells(cars, car.id);
  const cells=[];
  if(car.o==='H'){
    let c=car.col-1;
    while(c>=0 && !occ.has(car.row+','+c)){ cells.push({row:car.row,col:c,dir:'left'}); c--; }
    c=car.col+car.len;
    while(c<BOARD && !occ.has(car.row+','+c)){ cells.push({row:car.row,col:c,dir:'right'}); c++; }
  } else {
    let r=car.row-1;
    while(r>=0 && !occ.has(r+','+car.col)){ cells.push({row:r,col:car.col,dir:'up'}); r--; }
    r=car.row+car.len;
    while(r<BOARD && !occ.has(r+','+car.col)){ cells.push({row:r,col:car.col,dir:'down'}); r++; }
  }
  return cells;
}
function applyMove(car, cell){
  if(car.o==='H'){
    car.col = (cell.dir==='left') ? cell.col : cell.col-(car.len-1);
  } else {
    car.row = (cell.dir==='up') ? cell.row : cell.row-(car.len-1);
  }
}

/* ============ DIFFICULTY SELECT ============ */
function levelsFor(difficulty){ return LEVELS.filter(lv=>lv.difficulty===difficulty); }
function renderDiffGrid(){
  const el=document.getElementById('diff-grid');
  el.innerHTML=DIFFICULTIES.map(d=>{
    const lvs=levelsFor(d.key);
    const clearedCount=lvs.filter(lv=>clearedLevels.has(lv.id)).length;
    return `
      <div class="diff-card ${d.className}" data-key="${d.key}">
        <div class="diff-name">${d.key}</div>
        <div class="diff-desc">${d.desc} · ${lvs.length}개 레벨</div>
        <div class="diff-progress">${clearedCount>0 ? `완료 ${clearedCount}/${lvs.length}` : '도전해보세요!'}</div>
      </div>
    `;
  }).join('');
  el.querySelectorAll('.diff-card').forEach(card=>{
    card.addEventListener('click',()=>openDifficulty(card.dataset.key));
  });
}
function openDifficulty(key){
  currentDifficulty=key;
  document.getElementById('setup').classList.add('hidden');
  document.getElementById('level-select').classList.remove('hidden');
  document.getElementById('diff-title').textContent=key;
  const meta=DIFFICULTIES.find(d=>d.key===key);
  document.getElementById('diff-subtitle').textContent=meta.desc;
  renderLevelGrid();
}
document.getElementById('back-to-diff').addEventListener('click',(e)=>{
  e.preventDefault();
  document.getElementById('level-select').classList.add('hidden');
  document.getElementById('setup').classList.remove('hidden');
  renderDiffGrid();
});

/* ============ LEVEL SELECT (within a difficulty) ============ */
function renderLevelGrid(){
  const el=document.getElementById('level-grid');
  const lvs=levelsFor(currentDifficulty);
  el.innerHTML=lvs.map((lv)=>{
    const globalIdx=LEVELS.indexOf(lv);
    return `
    <div class="level-card ${clearedLevels.has(lv.id)?'cleared':''}" data-idx="${globalIdx}">
      <div class="num">${lv.id}</div>
      ${clearedLevels.has(lv.id) ? `<div class="check">완료 ✓</div>` : `<div class="best">최적 ${lv.optimal}수</div>`}
    </div>
  `;}).join('');
  el.querySelectorAll('.level-card').forEach(card=>{
    card.addEventListener('click',()=>startLevel(+card.dataset.idx));
  });
}
function startLevel(idx){
  currentLevelIdx=idx;
  const lv=LEVELS[idx];
  currentDifficulty=lv.difficulty;
  initialCars=cloneCars(lv.cars);
  cars=cloneCars(lv.cars);
  history=[];
  moveCount=0;
  selectedId=null;
  gameOver=false;
  document.getElementById('setup').classList.add('hidden');
  document.getElementById('level-select').classList.add('hidden');
  document.getElementById('game').classList.remove('hidden');
  document.getElementById('level-chip').textContent=`${lv.difficulty} · 레벨 ${lv.id}`;
  applyZoom();
  renderAll();
}

/* ============ ZOOM ============ */
const UI_ZOOM_DEFAULT=1, UI_ZOOM_MIN=0.5, UI_ZOOM_MAX=1.8, UI_ZOOM_STEP=0.1;
let uiZoom=UI_ZOOM_DEFAULT;
function applyZoom(){
  document.getElementById('game').style.zoom=uiZoom;
  document.getElementById('zoom-pct').textContent=Math.round(uiZoom*100)+'%';
  document.getElementById('zoom-out-btn').disabled=uiZoom<=UI_ZOOM_MIN+1e-9;
  document.getElementById('zoom-in-btn').disabled=uiZoom>=UI_ZOOM_MAX-1e-9;
}
document.getElementById('zoom-out-btn').addEventListener('click',()=>{ uiZoom=Math.max(UI_ZOOM_MIN, +(uiZoom-UI_ZOOM_STEP).toFixed(2)); applyZoom(); });
document.getElementById('zoom-in-btn').addEventListener('click',()=>{ uiZoom=Math.min(UI_ZOOM_MAX, +(uiZoom+UI_ZOOM_STEP).toFixed(2)); applyZoom(); });

/* ============ RENDER ============ */
function renderAll(){
  renderBoard();
  document.getElementById('move-chip').textContent=`이동 횟수: ${moveCount}`;
  document.getElementById('undo-btn').disabled = history.length===0 || gameOver;
}
function renderBoard(){
  const board=document.getElementById('board');
  board.innerHTML='';
  const reach = selectedId ? computeReach(findCar(selectedId)) : [];
  const reachMap={};
  reach.forEach(c=>{ reachMap[c.row+','+c.col]=c; });

  // background cells
  for(let r=0;r<BOARD;r++){
    for(let c=0;c<BOARD;c++){
      const div=document.createElement('div');
      let cls='cell';
      if(reachMap[r+','+c]) cls+=' reachable';
      if(r===EXIT_ROW && c===BOARD-1) cls+=' exit-cell';
      div.className=cls;
      div.style.gridColumn=(c+1);
      div.style.gridRow=(r+1);
      if(reachMap[r+','+c]){
        div.addEventListener('click',()=>onReachableClick(reachMap[r+','+c]));
      }
      if(r===EXIT_ROW && c===BOARD-1){
        const mark=document.createElement('div');
        mark.className='exit-mark';
        div.appendChild(mark);
      }
      board.appendChild(div);
    }
  }
  // cars
  cars.forEach(car=>{
    const div=document.createElement('div');
    div.className='car'+(car.target?' target':'')+(car.id===selectedId?' selected':'');
    div.style.background=car.color;
    if(car.o==='H'){
      div.style.gridRow=(car.row+1);
      div.style.gridColumn=`${car.col+1} / span ${car.len}`;
    } else {
      div.style.gridColumn=(car.col+1);
      div.style.gridRow=`${car.row+1} / span ${car.len}`;
    }
    div.addEventListener('click',(e)=>{ e.stopPropagation(); onCarClick(car.id); });
    board.appendChild(div);
  });
}

/* ============ INTERACTION ============ */
function onCarClick(id){
  if(gameOver) return;
  selectedId = (selectedId===id) ? null : id;
  renderBoard();
}
function onReachableClick(cell){
  if(gameOver || !selectedId) return;
  const car=findCar(selectedId);
  history.push(cloneCars(cars));
  applyMove(car, cell);
  moveCount++;
  selectedId=null;
  renderAll();
  if(isSolved()){
    gameOver=true;
    setTimeout(onWin, 220);
  }
}
document.getElementById('undo-btn').addEventListener('click',()=>{
  if(history.length===0 || gameOver) return;
  cars=history.pop();
  moveCount=Math.max(0, moveCount-1);
  selectedId=null;
  renderAll();
});
document.getElementById('reset-btn').addEventListener('click',()=>{
  cars=cloneCars(initialCars);
  history=[];
  moveCount=0;
  selectedId=null;
  gameOver=false;
  renderAll();
});
document.getElementById('hint-btn').addEventListener('click',()=>{
  const lv=LEVELS[currentLevelIdx];
  const btn=document.getElementById('hint-btn');
  btn.textContent=`💡 최적: ${lv.optimal}수`;
  setTimeout(()=>{ btn.textContent='💡 최적 이동 수 보기'; }, 2200);
});

/* ============ WIN ============ */
function levelIndicesForDifficulty(diff){
  return LEVELS.map((lv,i)=>i).filter(i=>LEVELS[i].difficulty===diff);
}
function onWin(){
  const lv=LEVELS[currentLevelIdx];
  clearedLevels.add(lv.id);
  const diff=moveCount-lv.optimal;
  let stars;
  if(diff<=0) stars='★★★';
  else if(diff<=2) stars='★★☆';
  else stars='★☆☆';
  document.getElementById('end-stars').textContent=stars;
  document.getElementById('end-stat').textContent=`내 이동 횟수: ${moveCount}회  (최적: ${lv.optimal}회)`;
  const idxs=levelIndicesForDifficulty(currentDifficulty);
  const posInTier=idxs.indexOf(currentLevelIdx);
  const hasNext=posInTier>=0 && posInTier<idxs.length-1;
  document.getElementById('next-btn').disabled = !hasNext;
  document.getElementById('next-btn').style.opacity = hasNext ? '1' : '0.4';
  document.getElementById('end-overlay').classList.remove('hidden');
}
document.getElementById('retry-btn').addEventListener('click',()=>{
  document.getElementById('end-overlay').classList.add('hidden');
  startLevel(currentLevelIdx);
});
document.getElementById('levels-btn').addEventListener('click',()=>{
  document.getElementById('end-overlay').classList.add('hidden');
  document.getElementById('game').classList.add('hidden');
  document.getElementById('level-select').classList.remove('hidden');
  renderLevelGrid();
});
document.getElementById('next-btn').addEventListener('click',()=>{
  document.getElementById('end-overlay').classList.add('hidden');
  const idxs=levelIndicesForDifficulty(currentDifficulty);
  const posInTier=idxs.indexOf(currentLevelIdx);
  if(posInTier>=0 && posInTier<idxs.length-1) startLevel(idxs[posInTier+1]);
});
document.getElementById('quit-btn').addEventListener('click',()=>{
  document.getElementById('game').classList.add('hidden');
  document.getElementById('level-select').classList.remove('hidden');
  renderLevelGrid();
});

renderDiffGrid();
</script>
</body>
</html>
